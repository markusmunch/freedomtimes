name: Terraform – Production

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/environments/production

    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
      TF_VAR_route_pattern: ${{ vars.TF_VAR_ROUTE_PATTERN }}
      TF_VAR_worker_name: ${{ vars.TF_VAR_WORKER_NAME }}
      TF_VAR_holding_title: ${{ vars.TF_VAR_HOLDING_TITLE }}
      TF_VAR_holding_heading: ${{ vars.TF_VAR_HOLDING_HEADING }}
      TF_VAR_holding_message: ${{ vars.TF_VAR_HOLDING_MESSAGE }}
      TF_VAR_contact_email: ${{ vars.TF_VAR_CONTACT_EMAIL }}
      TF_VAR_manage_apex_dns_record: "true"
      TF_VAR_apex_dns_record_content: "192.0.2.1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        run: terraform init

      - name: Reconcile Existing Cloudflare Resources
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set +e

          script_id=$(terraform state show module.cloudflare_holding_page.cloudflare_workers_script.holding_page >/dev/null 2>&1; echo $?)
          if [ "$script_id" -ne 0 ]; then
            terraform import -no-color module.cloudflare_holding_page.cloudflare_workers_script.holding_page "$TF_VAR_cloudflare_account_id/$TF_VAR_worker_name" || true
          fi

          route_id=$(terraform state show module.cloudflare_holding_page.cloudflare_workers_route.holding_page >/dev/null 2>&1; echo $?)
          if [ "$route_id" -ne 0 ]; then
            terraform import -no-color module.cloudflare_holding_page.cloudflare_workers_route.holding_page "$TF_VAR_cloudflare_zone_id/$TF_VAR_route_pattern" || true
          fi

          apex_id=$(terraform state show 'module.cloudflare_holding_page.cloudflare_record.apex[0]' >/dev/null 2>&1; echo $?)
          if [ "$apex_id" -ne 0 ]; then
            terraform import -no-color 'module.cloudflare_holding_page.cloudflare_record.apex[0]' "$TF_VAR_cloudflare_zone_id/freedomtimes.news/A" || true
          fi

          set -e

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: false

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = require('child_process')
              .execSync('terraform show -no-color tfplan', { cwd: 'infra/terraform/environments/production' })
              .toString();
            const body = `### Terraform Plan – Production\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Terraform Apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: terraform apply tfplan

name: Terraform - Production

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - "functions/editorial-api/**"
      - "web/**"
      - ".github/workflows/terraform-production.yml"
  workflow_dispatch:
    inputs:
      production_terraform_apply:
        description: "Run Terraform apply (true) or plan-only (false)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  PRODUCTION_TERRAFORM_APPLY: "false"

jobs:
  terraform:
    name: "Apply to Production"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/environments/production

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
      TF_VAR_route_pattern: ${{ vars.TF_VAR_ROUTE_PATTERN_PRODUCTION }}
      TF_VAR_worker_name: ${{ vars.TF_VAR_WORKER_NAME_PRODUCTION }}
      TF_VAR_manage_apex_dns_record: ${{ vars.TF_VAR_MANAGE_APEX_DNS_RECORD_PRODUCTION }}
      TF_VAR_apex_dns_record_content: ${{ vars.TF_VAR_APEX_DNS_RECORD_CONTENT_PRODUCTION }}
      TF_VAR_workspace_url: ${{ vars.TF_VAR_WORKSPACE_URL_PRODUCTION }}
      TF_VAR_auth0_api_identifier: ${{ vars.AUTH0_API_AUDIENCE }}
      TF_VAR_api_management_allowed_origins: ${{ vars.TF_VAR_API_MANAGEMENT_ALLOWED_ORIGINS_PRODUCTION }}
      TF_VAR_auth0_domain: ${{ secrets.TF_VAR_AUTH0_DOMAIN }}
      TF_VAR_auth0_management_client_id: ${{ secrets.TF_VAR_AUTH0_MANAGEMENT_CLIENT_ID || secrets.TF_VAR_AUTH0_CLIENT_ID }}
      TF_VAR_auth0_management_client_secret: ${{ secrets.TF_VAR_AUTH0_MANAGEMENT_CLIENT_SECRET || secrets.TF_VAR_AUTH0_CLIENT_SECRET }}
      TF_VAR_turso_api_token: ${{ secrets.TURSO_TOKEN }}
      TF_VAR_turso_organization: ${{ vars.TF_VAR_TURSO_ORGANIZATION }}
      TF_VAR_turso_database_group: ${{ vars.TF_VAR_TURSO_DATABASE_GROUP_PRODUCTION }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: Validate Required Terraform Environment
        run: |
          set -euo pipefail

          required=(
            TF_TOKEN_app_terraform_io
            TF_VAR_cloudflare_api_token
            TF_VAR_cloudflare_account_id
            TF_VAR_cloudflare_zone_id
            TF_VAR_auth0_domain
            TF_VAR_auth0_management_client_id
            TF_VAR_auth0_management_client_secret
            TF_VAR_turso_api_token
            TF_VAR_turso_organization
            TF_VAR_turso_database_group
            TF_VAR_route_pattern
            TF_VAR_workspace_url
            TF_VAR_api_management_allowed_origins
          )

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required environment variables: ${missing[*]}"
            exit 1
          fi

          echo "All required Terraform environment variables are present."

      - name: Preflight Unlock Stale TFC Lock
        env:
          TFC_ORG: freedomtimes
          TFC_WORKSPACE: freedomtimes-production
        run: |
          set -euo pipefail
          API_BASE="https://app.terraform.io/api/v2"
          AUTH_HEADER="Authorization: Bearer $TF_TOKEN_app_terraform_io"
          CT_HEADER="Content-Type: application/vnd.api+json"

          WS_JSON=$(curl -sS -H "$AUTH_HEADER" "$API_BASE/organizations/$TFC_ORG/workspaces/$TFC_WORKSPACE")
          WS_ID=$(echo "$WS_JSON" | jq -r '.data.id')
          LOCKED=$(echo "$WS_JSON" | jq -r '.data.attributes.locked')

          echo "workspace_id=$WS_ID locked=$LOCKED"

          if [ "$LOCKED" = "true" ]; then
            echo "Stale lock detected, submitting unlock before terraform init"
            curl -sS -X POST \
              -H "$AUTH_HEADER" \
              -H "$CT_HEADER" \
              --data '{"reason":"Auto-unlock stale lock before production workflow run"}' \
              "$API_BASE/workspaces/$WS_ID/actions/unlock" >/dev/null
            sleep 3
          fi

      - name: Terraform Init
        run: terraform init -input=false


      - name: Terraform Validate
        run: terraform validate

      - name: Prune Legacy Azure State Entries
        run: |
          set -euo pipefail

          # Some legacy Azure resources were removed out-of-band and can no longer be refreshed.
          # Remove them from state so plan/apply can converge on the new non-Azure topology.
          mapfile -t legacy_addrs < <(terraform state list | grep -E '^(module\.azure_editorial_api\.|cloudflare_record\.api_custom_hostname\[0\]|time_sleep\.wait_for_api_custom_hostname_dns\[0\])' || true)

          if [ "${#legacy_addrs[@]}" -eq 0 ]; then
            echo "No legacy Azure/APIM state entries found."
            exit 0
          fi

          echo "Removing legacy state entries:"
          printf '  - %s\n' "${legacy_addrs[@]}"

          terraform state rm "${legacy_addrs[@]}"

      - name: Import Existing Worker Route If Needed
        run: |
          set -euo pipefail

          route_addr='module.cloudflare_holding_page.cloudflare_workers_route.holding_page[0]'

          if terraform state show "$route_addr" >/dev/null 2>&1; then
            echo "Worker route already tracked in state."
            exit 0
          fi

          routes_json=$(curl -fsS \
            -H "Authorization: Bearer ${TF_VAR_cloudflare_api_token}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${TF_VAR_cloudflare_zone_id}/workers/routes")

          route_id=$(echo "$routes_json" | jq -r \
            --arg pattern "$TF_VAR_route_pattern" \
            --arg script "$TF_VAR_worker_name" \
            '.result[] | select(.pattern == $pattern and .script == $script) | .id' | head -n1)

          if [ -z "$route_id" ] || [ "$route_id" = "null" ]; then
            echo "No pre-existing worker route found for pattern ${TF_VAR_route_pattern} and script ${TF_VAR_worker_name}."
            exit 0
          fi

          echo "Importing existing worker route ${route_id} into Terraform state."
          terraform import "$route_addr" "${TF_VAR_cloudflare_zone_id}/${route_id}"

      - name: Terraform Plan
        id: plan
        timeout-minutes: 20
        run: |
          echo "Starting terraform plan (non-interactive) with heartbeat logging..."
          set +e
          timeout 12m terraform plan -input=false -lock-timeout=5m -no-color -detailed-exitcode -out=tfplan > plan.log 2>&1 &
          PLAN_PID=$!

          while kill -0 "$PLAN_PID" 2>/dev/null; do
            echo "[plan-heartbeat] $(date -u +"%Y-%m-%dT%H:%M:%SZ") terraform plan still running"
            tail -n 20 plan.log || true
            sleep 30
          done

          wait "$PLAN_PID"
          PLAN_EXIT=$?
          set -e

          echo "--- terraform plan output ---"
          cat plan.log

          if [ "$PLAN_EXIT" -eq 124 ]; then
            echo "terraform plan timed out after 12 minutes"
            exit 1
          fi

          if [ "$PLAN_EXIT" -eq 1 ]; then
            echo "terraform plan failed with exit code 1"
            exit 1
          fi
          if [ "$PLAN_EXIT" -eq 0 ]; then
            echo "terraform plan completed: no changes"
          elif [ "$PLAN_EXIT" -eq 2 ]; then
            echo "terraform plan completed: changes detected"
          else
            echo "terraform plan returned unexpected exit code: $PLAN_EXIT"
            exit "$PLAN_EXIT"
          fi
        continue-on-error: false

      - name: Terraform Apply
        if: (env.PRODUCTION_TERRAFORM_APPLY == 'true') || (github.event_name == 'workflow_dispatch' && github.event.inputs.production_terraform_apply == 'true')
        timeout-minutes: 30
        run: |
          echo "Starting terraform apply with heartbeat logging..."
          set +e
          timeout 20m terraform apply -input=false -lock-timeout=5m -no-color tfplan > apply.log 2>&1 &
          APPLY_PID=$!

          while kill -0 "$APPLY_PID" 2>/dev/null; do
            echo "[apply-heartbeat] $(date -u +"%Y-%m-%dT%H:%M:%SZ") terraform apply still running"
            tail -n 20 apply.log || true
            sleep 30
          done

          wait "$APPLY_PID"
          APPLY_EXIT=$?
          set -e

          echo "--- terraform apply output ---"
          cat apply.log

          if [ "$APPLY_EXIT" -eq 124 ]; then
            echo "terraform apply timed out after 20 minutes"
            exit 1
          fi

          if [ "$APPLY_EXIT" -ne 0 ]; then
            echo "terraform apply failed with exit code $APPLY_EXIT"
            exit "$APPLY_EXIT"
          fi

      - name: Capture Terraform Outputs
        id: tf_outputs
        run: |
          set -euo pipefail

          AUTH0_APP_CLIENT_ID=$(terraform output -raw auth0_app_client_id 2>/dev/null || echo "")
          TURSO_DATABASE_URL=$(terraform output -raw turso_database_url 2>/dev/null || echo "")
          TURSO_AUTH_TOKEN=$(terraform output -raw turso_database_auth_token 2>/dev/null || echo "")
          SCHEDULER_TURSO_DATABASE_URL=$(terraform output -raw scheduler_turso_database_url 2>/dev/null || echo "")
          SCHEDULER_TURSO_AUTH_TOKEN=$(terraform output -raw scheduler_turso_database_auth_token 2>/dev/null || echo "")
          SUBSCRIPTIONS_TURSO_DATABASE_URL=$(terraform output -raw subscriptions_turso_database_url 2>/dev/null || echo "")
          SUBSCRIPTIONS_TURSO_AUTH_TOKEN=$(terraform output -raw subscriptions_turso_database_auth_token 2>/dev/null || echo "")

          echo "auth0_app_client_id=$AUTH0_APP_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "turso_database_url=$TURSO_DATABASE_URL" >> $GITHUB_OUTPUT
          echo "::add-mask::$TURSO_AUTH_TOKEN"
          echo "turso_auth_token=$TURSO_AUTH_TOKEN" >> $GITHUB_OUTPUT
          echo "scheduler_turso_database_url=$SCHEDULER_TURSO_DATABASE_URL" >> $GITHUB_OUTPUT
          echo "::add-mask::$SCHEDULER_TURSO_AUTH_TOKEN"
          echo "scheduler_turso_auth_token=$SCHEDULER_TURSO_AUTH_TOKEN" >> $GITHUB_OUTPUT
          echo "subscriptions_turso_database_url=$SUBSCRIPTIONS_TURSO_DATABASE_URL" >> $GITHUB_OUTPUT
          echo "::add-mask::$SUBSCRIPTIONS_TURSO_AUTH_TOKEN"
          echo "subscriptions_turso_auth_token=$SUBSCRIPTIONS_TURSO_AUTH_TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch Auth0 App Secret
        id: auth0_app_secret
        env:
          AUTH0_DOMAIN: ${{ secrets.TF_VAR_AUTH0_DOMAIN }}
          AUTH0_MANAGEMENT_CLIENT_ID: ${{ secrets.TF_VAR_AUTH0_MANAGEMENT_CLIENT_ID || secrets.TF_VAR_AUTH0_CLIENT_ID }}
          AUTH0_MANAGEMENT_CLIENT_SECRET: ${{ secrets.TF_VAR_AUTH0_MANAGEMENT_CLIENT_SECRET || secrets.TF_VAR_AUTH0_CLIENT_SECRET }}
          AUTH0_APP_CLIENT_ID: ${{ steps.tf_outputs.outputs.auth0_app_client_id }}
        run: |
          set -euo pipefail

          TOKEN=$(curl -sS --fail \
            --request POST \
            --url "https://${AUTH0_DOMAIN}/oauth/token" \
            --header 'content-type: application/json' \
            --data "{\"grant_type\":\"client_credentials\",\"client_id\":\"${AUTH0_MANAGEMENT_CLIENT_ID}\",\"client_secret\":\"${AUTH0_MANAGEMENT_CLIENT_SECRET}\",\"audience\":\"https://${AUTH0_DOMAIN}/api/v2/\"}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")

          AUTH0_APP_CLIENT_SECRET=$(curl -sS --fail \
            --url "https://${AUTH0_DOMAIN}/api/v2/clients/${AUTH0_APP_CLIENT_ID}" \
            --header "authorization: Bearer ${TOKEN}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['client_secret'])")

          echo "::add-mask::$AUTH0_APP_CLIENT_SECRET"
          echo "auth0_app_client_secret=$AUTH0_APP_CLIENT_SECRET" >> "$GITHUB_OUTPUT"

      - name: Cleanup Terraform Plan File
        if: always()
        run: rm -f tfplan

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            scheduler-worker/package-lock.json
            web/package-lock.json

      - name: Install Scheduler Worker Dependencies
        if: steps.tf_outputs.outputs.scheduler_turso_database_url != '' && steps.tf_outputs.outputs.scheduler_turso_database_url != 'null'
        working-directory: scheduler-worker
        run: npm ci

      - name: Validate Worker Runtime Vars
        run: |
          set -euo pipefail
          API_BASE_URL="${{ vars.API_BASE_URL_PRODUCTION || 'https://api.freedomtimes.news/editorial' }}"
          AUTH0_API_AUDIENCE="${{ vars.AUTH0_API_AUDIENCE || 'https://api.freedomtimes.news' }}"
          COOKIE_BASE_DOMAIN="${{ vars.COOKIE_BASE_DOMAIN }}"
          AUTH0_ROLES_CLAIM_NAMESPACE="${{ vars.AUTH0_ROLES_CLAIM_NAMESPACE }}"

          if [ -z "$API_BASE_URL" ] || [ "$API_BASE_URL" = "null" ]; then
            echo "Missing required repository var/default for API_BASE_URL"
            exit 1
          fi

          if [ -z "$AUTH0_API_AUDIENCE" ] || [ "$AUTH0_API_AUDIENCE" = "null" ]; then
            echo "Missing required repository var: AUTH0_API_AUDIENCE"
            exit 1
          fi

          if [ -z "$COOKIE_BASE_DOMAIN" ]; then
            echo "Missing required repository var: COOKIE_BASE_DOMAIN"
            exit 1
          fi

          if [ -z "$AUTH0_ROLES_CLAIM_NAMESPACE" ]; then
            echo "Missing required repository var: AUTH0_ROLES_CLAIM_NAMESPACE"
            exit 1
          fi

      - name: Validate Web Worker Secret Inputs
        if: steps.tf_outputs.outputs.api_base_url != '' && steps.tf_outputs.outputs.api_base_url != 'null'
        env:
          AUTH0_DOMAIN_VALUE: ${{ secrets.TF_VAR_AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID_VALUE: ${{ steps.tf_outputs.outputs.auth0_app_client_id }}
          AUTH0_CLIENT_SECRET_VALUE: ${{ steps.auth0_app_secret.outputs.auth0_app_client_secret }}
          TURSO_DATABASE_URL_VALUE: ${{ steps.tf_outputs.outputs.turso_database_url }}
          TURSO_AUTH_TOKEN_VALUE: ${{ steps.tf_outputs.outputs.turso_auth_token }}
          TURSO_SUBSCRIPTIONS_DATABASE_URL_VALUE: ${{ steps.tf_outputs.outputs.subscriptions_turso_database_url }}
          TURSO_SUBSCRIPTIONS_AUTH_TOKEN_VALUE: ${{ steps.tf_outputs.outputs.subscriptions_turso_auth_token }}
          PUSH_SUBSCRIBE_PUBLIC_KEY_VALUE: ${{ secrets.PUSH_PRODUCTION_SUBSCRIBE_PUBLIC_KEY }}
          EMDASH_AUTH_SECRET_VALUE: ${{ secrets.EMDASH_AUTH_SECRET_PRODUCTION }}
        run: |
          set -euo pipefail

          required=(
            AUTH0_DOMAIN_VALUE
            AUTH0_CLIENT_ID_VALUE
            AUTH0_CLIENT_SECRET_VALUE
            TURSO_DATABASE_URL_VALUE
            TURSO_AUTH_TOKEN_VALUE
            TURSO_SUBSCRIPTIONS_DATABASE_URL_VALUE
            TURSO_SUBSCRIPTIONS_AUTH_TOKEN_VALUE
            PUSH_SUBSCRIBE_PUBLIC_KEY_VALUE
            EMDASH_AUTH_SECRET_VALUE
          )

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required inputs for production web worker secret sync: ${missing[*]}"
            exit 1
          fi

      - name: Validate Scheduler Worker Secret Inputs
        if: steps.tf_outputs.outputs.scheduler_turso_database_url != '' && steps.tf_outputs.outputs.scheduler_turso_database_url != 'null'
        env:
          TURSO_SCHEDULER_DATABASE_URL_VALUE: ${{ steps.tf_outputs.outputs.scheduler_turso_database_url }}
          TURSO_SCHEDULER_AUTH_TOKEN_VALUE: ${{ steps.tf_outputs.outputs.scheduler_turso_auth_token }}
          TURSO_SUBSCRIPTIONS_DATABASE_URL_VALUE: ${{ steps.tf_outputs.outputs.subscriptions_turso_database_url }}
          TURSO_SUBSCRIPTIONS_AUTH_TOKEN_VALUE: ${{ steps.tf_outputs.outputs.subscriptions_turso_auth_token }}
          PUSH_VAPID_PUBLIC_KEY_VALUE: ${{ secrets.PUSH_PRODUCTION_SUBSCRIBE_PUBLIC_KEY }}
          PUSH_VAPID_PRIVATE_KEY_VALUE: ${{ secrets.PUSH_PRODUCTION_VAPID_PRIVATE_KEY }}
          PUSH_VAPID_SUBJECT_VALUE: ${{ secrets.PUSH_PRODUCTION_VAPID_SUBJECT }}
          PUSH_ANDROID_FCM_PROJECT_ID_VALUE: ${{ secrets.PUSH_PRODUCTION_ANDROID_FCM_PROJECT_ID }}
          PUSH_ANDROID_FCM_CLIENT_EMAIL_VALUE: ${{ secrets.PUSH_PRODUCTION_ANDROID_FCM_CLIENT_EMAIL }}
          PUSH_ANDROID_FCM_PRIVATE_KEY_VALUE: ${{ secrets.PUSH_PRODUCTION_ANDROID_FCM_PRIVATE_KEY }}
          PUSH_IOS_APNS_TEAM_ID_VALUE: ${{ secrets.PUSH_PRODUCTION_IOS_APNS_TEAM_ID }}
          PUSH_IOS_APNS_KEY_ID_VALUE: ${{ secrets.PUSH_PRODUCTION_IOS_APNS_KEY_ID }}
          PUSH_IOS_APNS_PRIVATE_KEY_VALUE: ${{ secrets.PUSH_PRODUCTION_IOS_APNS_PRIVATE_KEY }}
          PUSH_IOS_APNS_BUNDLE_ID_VALUE: ${{ secrets.PUSH_PRODUCTION_IOS_APNS_BUNDLE_ID }}
        run: |
          set -euo pipefail

          required=(
            TURSO_SCHEDULER_DATABASE_URL_VALUE
            TURSO_SCHEDULER_AUTH_TOKEN_VALUE
            TURSO_SUBSCRIPTIONS_DATABASE_URL_VALUE
            TURSO_SUBSCRIPTIONS_AUTH_TOKEN_VALUE
            PUSH_VAPID_PUBLIC_KEY_VALUE
            PUSH_VAPID_PRIVATE_KEY_VALUE
            PUSH_VAPID_SUBJECT_VALUE
            PUSH_ANDROID_FCM_PROJECT_ID_VALUE
            PUSH_ANDROID_FCM_CLIENT_EMAIL_VALUE
            PUSH_ANDROID_FCM_PRIVATE_KEY_VALUE
          )

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required inputs for production scheduler worker secret sync: ${missing[*]}"
            exit 1
          fi

          ios_required=(
            PUSH_IOS_APNS_TEAM_ID_VALUE
            PUSH_IOS_APNS_KEY_ID_VALUE
            PUSH_IOS_APNS_PRIVATE_KEY_VALUE
            PUSH_IOS_APNS_BUNDLE_ID_VALUE
          )

          ios_set=0
          for name in "${ios_required[@]}"; do
            if [ -n "${!name:-}" ]; then
              ios_set=$((ios_set + 1))
            fi
          done

          if [ "$ios_set" -ne 0 ] && [ "$ios_set" -ne 4 ]; then
            echo "iOS APNS secrets must be configured all-or-none for production scheduler worker"
            exit 1
          fi

      - name: Install Web Dependencies
        working-directory: web
        run: |
          set -euo pipefail

          echo "[web-deps] node=$(node -v) npm=$(npm -v)"
          echo "[web-deps] pwd=$(pwd)"
          TYPESCRIPT_VERSION=$(node -e 'const p=require("./package.json"); process.stdout.write((p.devDependencies && p.devDependencies.typescript) || "")')
          echo "[web-deps] package typescript=${TYPESCRIPT_VERSION}"

          if ! npm ci; then
            echo "[web-deps] npm ci failed; attempting npm install fallback"
            npm install --no-audit --no-fund
          fi

      - name: Apply Scheduler Database Migration and Seed
        if: steps.tf_outputs.outputs.scheduler_turso_database_url != '' && steps.tf_outputs.outputs.scheduler_turso_database_url != 'null'
        working-directory: web
        env:
          TURSO_SCHEDULER_DATABASE_URL: ${{ steps.tf_outputs.outputs.scheduler_turso_database_url }}
          TURSO_SCHEDULER_AUTH_TOKEN: ${{ steps.tf_outputs.outputs.scheduler_turso_auth_token }}
        run: |
          set -euo pipefail

          if [ -z "${TURSO_SCHEDULER_DATABASE_URL}" ]; then
            echo "ERROR: TURSO_SCHEDULER_DATABASE_URL is required but empty from Terraform outputs"
            exit 1
          fi

          if [ -z "${TURSO_SCHEDULER_AUTH_TOKEN}" ]; then
            echo "ERROR: TURSO_SCHEDULER_AUTH_TOKEN is required but empty from Terraform outputs"
            exit 1
          fi

          npm run scheduler:db:deploy

      - name: Apply Subscriptions Database Migration and Seed
        if: steps.tf_outputs.outputs.subscriptions_turso_database_url != '' && steps.tf_outputs.outputs.subscriptions_turso_database_url != 'null'
        working-directory: web
        env:
          TURSO_SUBSCRIPTIONS_DATABASE_URL: ${{ steps.tf_outputs.outputs.subscriptions_turso_database_url }}
          TURSO_SUBSCRIPTIONS_AUTH_TOKEN: ${{ steps.tf_outputs.outputs.subscriptions_turso_auth_token }}
        run: |
          set -euo pipefail

          if [ -z "${TURSO_SUBSCRIPTIONS_DATABASE_URL}" ]; then
            echo "ERROR: TURSO_SUBSCRIPTIONS_DATABASE_URL is required but empty from Terraform outputs"
            exit 1
          fi

          if [ -z "${TURSO_SUBSCRIPTIONS_AUTH_TOKEN}" ]; then
            echo "ERROR: TURSO_SUBSCRIPTIONS_AUTH_TOKEN is required but empty from Terraform outputs"
            exit 1
          fi

          npm run subscriptions:db:deploy

      - name: Build Astro Worker
        working-directory: web
        env:
          TURSO_DATABASE_URL: ${{ steps.tf_outputs.outputs.turso_database_url }}
          TURSO_AUTH_TOKEN: ${{ steps.tf_outputs.outputs.turso_auth_token }}
        run: |
          set -euo pipefail

          if [ -z "${TURSO_DATABASE_URL}" ]; then
            echo "ERROR: TURSO_DATABASE_URL is required but empty from Terraform outputs"
            exit 1
          fi

          if [ -z "${TURSO_AUTH_TOKEN}" ]; then
            echo "ERROR: TURSO_AUTH_TOKEN is required but empty from Terraform outputs"
            exit 1
          fi

          npm run build

      - name: Deploy Astro Worker to Production
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          AUTH0_API_AUDIENCE: ${{ vars.AUTH0_API_AUDIENCE || 'https://api.freedomtimes.news' }}
          API_BASE_URL: ${{ vars.API_BASE_URL_PRODUCTION || 'https://api.freedomtimes.news/editorial' }}
          COOKIE_BASE_DOMAIN: ${{ vars.COOKIE_BASE_DOMAIN }}
          AUTH0_ROLES_CLAIM_NAMESPACE: ${{ vars.AUTH0_ROLES_CLAIM_NAMESPACE }}
          API_UPSTREAM_MODE: ${{ vars.API_UPSTREAM_MODE }}
        run: >
          npx wrangler deploy --config wrangler.jsonc --env production
          --var AUTH0_API_AUDIENCE:$AUTH0_API_AUDIENCE
          --var API_BASE_URL:$API_BASE_URL
          --var COOKIE_BASE_DOMAIN:$COOKIE_BASE_DOMAIN
          --var AUTH0_ROLES_CLAIM_NAMESPACE:$AUTH0_ROLES_CLAIM_NAMESPACE
          --var API_UPSTREAM_MODE:$API_UPSTREAM_MODE

      - name: Deploy Scheduler Worker to Production
        if: steps.tf_outputs.outputs.scheduler_turso_database_url != '' && steps.tf_outputs.outputs.scheduler_turso_database_url != 'null'
        working-directory: scheduler-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          npx wrangler deploy --config wrangler.jsonc --env production

      - name: Set Worker Secrets for Production
        working-directory: web
        # Cloudflare Worker secrets are synced here from Terraform outputs and Auth0 Management API.
        # Auth0 login app credentials come from the Terraform-managed application.
        # Canonical source: Terraform/Auth0 → workflow → Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          AUTH0_DOMAIN_VALUE: ${{ secrets.TF_VAR_AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID_VALUE: ${{ steps.tf_outputs.outputs.auth0_app_client_id }}
          AUTH0_CLIENT_SECRET_VALUE: ${{ steps.auth0_app_secret.outputs.auth0_app_client_secret }}
          TURSO_DATABASE_URL_VALUE: ${{ steps.tf_outputs.outputs.turso_database_url }}
          TURSO_AUTH_TOKEN_VALUE: ${{ steps.tf_outputs.outputs.turso_auth_token }}
          TURSO_SUBSCRIPTIONS_DATABASE_URL_VALUE: ${{ steps.tf_outputs.outputs.subscriptions_turso_database_url }}
          TURSO_SUBSCRIPTIONS_AUTH_TOKEN_VALUE: ${{ steps.tf_outputs.outputs.subscriptions_turso_auth_token }}
          PUSH_SUBSCRIBE_PUBLIC_KEY_VALUE: ${{ secrets.PUSH_PRODUCTION_SUBSCRIBE_PUBLIC_KEY }}
          EMDASH_AUTH_SECRET_VALUE: ${{ secrets.EMDASH_AUTH_SECRET_PRODUCTION }}
          EMDASH_PREVIEW_SECRET_VALUE: ${{ secrets.EMDASH_PREVIEW_SECRET_PRODUCTION }}
        run: |
          set -euo pipefail

          if [ -z "${EMDASH_AUTH_SECRET_VALUE:-}" ]; then
            echo "Missing required secret: EMDASH_AUTH_SECRET_PRODUCTION"
            exit 1
          fi

          printf '%s' "$AUTH0_DOMAIN_VALUE" | npx wrangler secret put AUTH0_DOMAIN --config wrangler.jsonc --env production
          printf '%s' "$AUTH0_CLIENT_ID_VALUE" | npx wrangler secret put AUTH0_CLIENT_ID --config wrangler.jsonc --env production
          printf '%s' "$AUTH0_CLIENT_SECRET_VALUE" | npx wrangler secret put AUTH0_CLIENT_SECRET --config wrangler.jsonc --env production
          printf '%s' "$TURSO_DATABASE_URL_VALUE" | npx wrangler secret put TURSO_DATABASE_URL --config wrangler.jsonc --env production
          printf '%s' "$TURSO_AUTH_TOKEN_VALUE" | npx wrangler secret put TURSO_AUTH_TOKEN --config wrangler.jsonc --env production
          printf '%s' "$TURSO_SUBSCRIPTIONS_DATABASE_URL_VALUE" | npx wrangler secret put TURSO_SUBSCRIPTIONS_DATABASE_URL --config wrangler.jsonc --env production
          printf '%s' "$TURSO_SUBSCRIPTIONS_AUTH_TOKEN_VALUE" | npx wrangler secret put TURSO_SUBSCRIPTIONS_AUTH_TOKEN --config wrangler.jsonc --env production
          printf '%s' "$PUSH_SUBSCRIBE_PUBLIC_KEY_VALUE" | npx wrangler secret put PUSH_SUBSCRIBE_PUBLIC_KEY --config wrangler.jsonc --env production
          printf '%s' "$EMDASH_AUTH_SECRET_VALUE" | npx wrangler secret put EMDASH_AUTH_SECRET --config wrangler.jsonc --env production

          if [ -n "${EMDASH_PREVIEW_SECRET_VALUE:-}" ]; then
            printf '%s' "$EMDASH_PREVIEW_SECRET_VALUE" | npx wrangler secret put EMDASH_PREVIEW_SECRET --config wrangler.jsonc --env production
          fi

      - name: Set Scheduler Worker Secrets for Production
        if: steps.tf_outputs.outputs.scheduler_turso_database_url != '' && steps.tf_outputs.outputs.scheduler_turso_database_url != 'null'
        working-directory: scheduler-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          TURSO_SCHEDULER_DATABASE_URL_VALUE: ${{ steps.tf_outputs.outputs.scheduler_turso_database_url }}
          TURSO_SCHEDULER_AUTH_TOKEN_VALUE: ${{ steps.tf_outputs.outputs.scheduler_turso_auth_token }}
          TURSO_SUBSCRIPTIONS_DATABASE_URL_VALUE: ${{ steps.tf_outputs.outputs.subscriptions_turso_database_url }}
          TURSO_SUBSCRIPTIONS_AUTH_TOKEN_VALUE: ${{ steps.tf_outputs.outputs.subscriptions_turso_auth_token }}
          PUSH_VAPID_PUBLIC_KEY_VALUE: ${{ secrets.PUSH_PRODUCTION_SUBSCRIBE_PUBLIC_KEY }}
          PUSH_VAPID_PRIVATE_KEY_VALUE: ${{ secrets.PUSH_PRODUCTION_VAPID_PRIVATE_KEY }}
          PUSH_VAPID_SUBJECT_VALUE: ${{ secrets.PUSH_PRODUCTION_VAPID_SUBJECT }}
          PUSH_ANDROID_FCM_PROJECT_ID_VALUE: ${{ secrets.PUSH_PRODUCTION_ANDROID_FCM_PROJECT_ID }}
          PUSH_ANDROID_FCM_CLIENT_EMAIL_VALUE: ${{ secrets.PUSH_PRODUCTION_ANDROID_FCM_CLIENT_EMAIL }}
          PUSH_ANDROID_FCM_PRIVATE_KEY_VALUE: ${{ secrets.PUSH_PRODUCTION_ANDROID_FCM_PRIVATE_KEY }}
          PUSH_IOS_APNS_TEAM_ID_VALUE: ${{ secrets.PUSH_PRODUCTION_IOS_APNS_TEAM_ID }}
          PUSH_IOS_APNS_KEY_ID_VALUE: ${{ secrets.PUSH_PRODUCTION_IOS_APNS_KEY_ID }}
          PUSH_IOS_APNS_PRIVATE_KEY_VALUE: ${{ secrets.PUSH_PRODUCTION_IOS_APNS_PRIVATE_KEY }}
          PUSH_IOS_APNS_BUNDLE_ID_VALUE: ${{ secrets.PUSH_PRODUCTION_IOS_APNS_BUNDLE_ID }}
        run: |
          set -euo pipefail

          printf '%s' "$TURSO_SCHEDULER_DATABASE_URL_VALUE" | npx wrangler secret put TURSO_SCHEDULER_DATABASE_URL --config wrangler.jsonc --env production
          printf '%s' "$TURSO_SCHEDULER_AUTH_TOKEN_VALUE" | npx wrangler secret put TURSO_SCHEDULER_AUTH_TOKEN --config wrangler.jsonc --env production
          printf '%s' "$TURSO_SUBSCRIPTIONS_DATABASE_URL_VALUE" | npx wrangler secret put TURSO_SUBSCRIPTIONS_DATABASE_URL --config wrangler.jsonc --env production
          printf '%s' "$TURSO_SUBSCRIPTIONS_AUTH_TOKEN_VALUE" | npx wrangler secret put TURSO_SUBSCRIPTIONS_AUTH_TOKEN --config wrangler.jsonc --env production
          printf '%s' "$PUSH_VAPID_PUBLIC_KEY_VALUE" | npx wrangler secret put PUSH_VAPID_PUBLIC_KEY --config wrangler.jsonc --env production
          printf '%s' "$PUSH_VAPID_PRIVATE_KEY_VALUE" | npx wrangler secret put PUSH_VAPID_PRIVATE_KEY --config wrangler.jsonc --env production
          printf '%s' "$PUSH_VAPID_SUBJECT_VALUE" | npx wrangler secret put PUSH_VAPID_SUBJECT --config wrangler.jsonc --env production
          printf '%s' "$PUSH_ANDROID_FCM_PROJECT_ID_VALUE" | npx wrangler secret put PUSH_ANDROID_FCM_PROJECT_ID --config wrangler.jsonc --env production
          printf '%s' "$PUSH_ANDROID_FCM_CLIENT_EMAIL_VALUE" | npx wrangler secret put PUSH_ANDROID_FCM_CLIENT_EMAIL --config wrangler.jsonc --env production
          printf '%s' "$PUSH_ANDROID_FCM_PRIVATE_KEY_VALUE" | npx wrangler secret put PUSH_ANDROID_FCM_PRIVATE_KEY --config wrangler.jsonc --env production

          if [ -n "${PUSH_IOS_APNS_TEAM_ID_VALUE:-}" ] && [ -n "${PUSH_IOS_APNS_KEY_ID_VALUE:-}" ] && [ -n "${PUSH_IOS_APNS_PRIVATE_KEY_VALUE:-}" ] && [ -n "${PUSH_IOS_APNS_BUNDLE_ID_VALUE:-}" ]; then
            printf '%s' "$PUSH_IOS_APNS_TEAM_ID_VALUE" | npx wrangler secret put PUSH_IOS_APNS_TEAM_ID --config wrangler.jsonc --env production
            printf '%s' "$PUSH_IOS_APNS_KEY_ID_VALUE" | npx wrangler secret put PUSH_IOS_APNS_KEY_ID --config wrangler.jsonc --env production
            printf '%s' "$PUSH_IOS_APNS_PRIVATE_KEY_VALUE" | npx wrangler secret put PUSH_IOS_APNS_PRIVATE_KEY --config wrangler.jsonc --env production
            printf '%s' "$PUSH_IOS_APNS_BUNDLE_ID_VALUE" | npx wrangler secret put PUSH_IOS_APNS_BUNDLE_ID --config wrangler.jsonc --env production
          fi

      - name: Cleanup Unlock TFC Workspace
        if: always()
        env:
          TFC_ORG: freedomtimes
          TFC_WORKSPACE: freedomtimes-production
        run: |
          set -euo pipefail
          API_BASE="https://app.terraform.io/api/v2"
          AUTH_HEADER="Authorization: Bearer $TF_TOKEN_app_terraform_io"
          CT_HEADER="Content-Type: application/vnd.api+json"

          WS_JSON=$(curl -sS -H "$AUTH_HEADER" "$API_BASE/organizations/$TFC_ORG/workspaces/$TFC_WORKSPACE")
          WS_ID=$(echo "$WS_JSON" | jq -r '.data.id')
          LOCKED=$(echo "$WS_JSON" | jq -r '.data.attributes.locked')

          if [ "$LOCKED" = "true" ]; then
            echo "Workspace lock still present at job end, submitting cleanup unlock"
            curl -sS -X POST \
              -H "$AUTH_HEADER" \
              -H "$CT_HEADER" \
              --data '{"reason":"Auto-unlock cleanup after production workflow run"}' \
              "$API_BASE/workspaces/$WS_ID/actions/unlock" >/dev/null || true
          else
            echo "Workspace already unlocked"
          fi


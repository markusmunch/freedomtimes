name: Capacitor Android

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/capacitor-android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-build:
    name: Android Debug Build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: web

    env:
      CAPACITOR_SERVER_URL: https://staging.freedomtimes.news

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Web Dependencies
        run: npm ci

      - name: Install Android SDK Packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Sync Capacitor Android
        run: npm run cap:sync:android

      - name: Assemble Android Debug Build
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: capacitor-android-debug-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          compression-level: 0
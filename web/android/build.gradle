// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Pin Build-Tools to an installed revision so Gradle does not try to auto-install 35.x into a non-writable SDK under Program Files.
subprojects { sub ->
    sub.afterEvaluate {
        if (sub.plugins.hasPlugin('com.android.library') || sub.plugins.hasPlugin('com.android.application')) {
            sub.android {
                buildToolsVersion "36.0.0"
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
